<div class="stat-card">
    <fa-icon [icon]="data.icon" class="icon text-size-5"></fa-icon>

    <div class="text-wrapper">
        <h5 class="text-small"> {{data.label}} </h5>
        <p class="value text-title text-size-5"> {{data.value}} </p>
        <small class="text-small"> {{data.todayCount}} Today</small>
    </div>

    <img src="images/stat-card-watermark.png" class="watermark" alt="Watermark">
</div>
