<div class="popup-wrapper" [class]="popupService.type()" animate.enter="popup-in" animate.leave="popup-out">
  <span class="text-description text-weight-300 text">{{ popupService.message() }}</span>
  <button class="xmark close-btn" (click)="popupService.close()">
    <fa-icon class="icon" [icon]="xmark"></fa-icon>
  </button>
</div>
