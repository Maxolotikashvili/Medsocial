<div class="dropdown-wrapper" (clickOutside)="toggleDropdown('off')">
    <button class="dropdown-toggle" (click)="toggleDropdown()">
        <span class="text-description three-dots label"> {{ displayedLabel() }} </span>
        <fa-icon [icon]="isOpen() ? this.icons['angleUp'] : this.icons['angleDown']"></fa-icon>
    </button>
    
    @if (isOpen()) {
        <div class="dropdown-menu" animate.enter="enter-dropdown">
            @for (option of displayedOptionsList(); track $index) {
                <button class="dropdown-button" (click)="selectOption(option)">{{ option }}</button>
            }
        </div>
    }
</div>
