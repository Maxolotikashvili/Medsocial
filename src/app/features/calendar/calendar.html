<div class="calendar-controls-wrapper">
  <div class="calendar-day-wrapper">
    <!-- <button class="time-button" [disabled]="viewDate.getMonth() <= minMonth.getMonth()" mwlCalendarPreviousView [view]="view" [(viewDate)]="viewDate" (viewDateChange)="closeOpenMonthViewDay()">Previous</button> -->
    <button class="time-button" mwlCalendarToday [(viewDate)]="viewDate">Today</button>
    <!-- <button class="time-button" [disabled]="viewDate.getMonth() >= maxMonth.getMonth()" mwlCalendarNextView [view]="view" [(viewDate)]="viewDate" (viewDateChange)="closeOpenMonthViewDay()">Next</button> -->
  </div>
  <div class="calendar-date-wrapper">
    <h3 class="heading-h3">{{ viewDate | calendarDate:(view + 'ViewTitle'):'en' }}</h3>
  </div>
  <div class="calendar-view-wrapper">
    <button class="calendar-view" (click)="setView(CalendarView.Month)" [class.active]="view === CalendarView.Month">Month</button>
    <button class="calendar-view" (click)="setView(CalendarView.Week)" [class.active]="view === CalendarView.Week">Week</button>
    <button class="calendar-view" (click)="setView(CalendarView.Day)" [class.active]="view === CalendarView.Day">Day</button>
  </div>
</div>
<br />
<div class="calendar-wrapper">
  @switch (view) { @case (CalendarView.Month) {
  <mwl-calendar-month-view  [viewDate]="viewDate" [events]="events" [refresh]="refresh" [activeDayIsOpen]="activeDayIsOpen"
    (dayClicked)="dayClicked($event.day)"
    (eventClicked)="handleEvent('Clicked', $event.event)"
    (eventTimesChanged)="eventTimesChanged($event)"
  />
  } @case (CalendarView.Week) {
  <mwl-calendar-week-view [hourSegments]="1" [viewDate]="viewDate" [events]="events" [refresh]="refresh"
    (eventClicked)="handleEvent('Clicked', $event.event)"
    (eventTimesChanged)="eventTimesChanged($event)"
  />
  } @case (CalendarView.Day) {
  <mwl-calendar-day-view 
    [hourSegments]="1"
    [viewDate]="viewDate" [events]="events" [refresh]="refresh"
    (eventClicked)="handleEvent('Clicked', $event.event)"
    (eventTimesChanged)="eventTimesChanged($event)"
  />
  } }
</div>
