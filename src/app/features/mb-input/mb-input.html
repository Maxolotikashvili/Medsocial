<!-- Text input -->
<div class="group" [class.error-state]="isInvalid" [class.type-date]="type() === 'date'" [class]="'appearance-'+ appearance()">
  @if (type() !== 'date') {
    <input
      [type]="type()"
      [required]="isRequired"
      [disabled]="isDisabled()"
      [id]="id()"
      [value]="value()"
      [placeholder]="appearance() === 'underlined' ? placeholder() : label()"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
      autocomplete="on"
      class="mb-input"
    />

    @if (appearance() === 'underlined') {
      <span class="highlight"></span>
      <span class="bar"></span>
      <label [for]="id()" class="label text-size-2"> {{ label() }} </label>
    }
  }
  
  <!-- Date input -->
  @if (type() === 'date') {
    <input
      type="date"
      [id]="id()"
      [required]="isRequired"
      [disabled]="isDisabled()"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
      [min]="min()"
      [max]="max()"
      [value]="value()"
      class="mb-input date-input"
    />
    <span class="bar"></span>
    <label [for]="id()" class="text-size-2"> {{ label() }} </label>
  }

  @if (isInvalid) {
    <span class="text-small error-text"> {{ currentErrorMessage }} </span>
  }
</div>
