<div class="login-modal-wrapper" tabindex="-1">
    <img src="images/company-logo.png" alt="Company-logo">

    <form (submit)="loginUser($event)">
        <div class="input-wrapper">
            <p-floatLabel variant="over">
                <input id="email" #loginInput type="text" pInputText (change)="emailValue.set($event.target.value)">
                <label for="email">Email</label>
            </p-floatLabel>
            
            <p-floatLabel variant="over">
                <input id="password" #loginInput type="password" pInputText (change)="passwordValue.set($event.target.value)">
                <label for="password">Password</label>
            </p-floatLabel>
        </div>

        <div class="remember-me-wrapper">
            <mb-checkbox [id]="'rememberMe'" label="Remember me" [(checked)]="isRememberMeChecked"></mb-checkbox>
            
            <a href="#" class="mb-link forget-link text-size-2">Forgot Password?</a>
        </div>

        @if (errorMessage()) {
            <span class="error-message text-small">{{errorMessage()}}</span>
        }

        <button class="mb-button-fullsize mb-button-round" [effect]="'arrow'">Sign In</button>
    </form>

    <div class="divider"></div>

    <div class="text-description text-button-wrapper">Already have an account? <button class="signup-link text-description" (click)="openRegisterModal()">Sign up</button></div>

    @if (isLoading()) {
        <loading></loading>
    }
</div>
