<div class="filters-component-wrapper" [class]="layout()">
    <ng-content></ng-content>
    
    @if (hasActiveFilters() && hasChangesSinceLastSubmit()) {   
        <button class="mb-button-s mb-button-round apply-filters-button" (click)="submitFilters()">Apply</button>
    }
    
    @if (isValueEmitted()) {
        <button class="mb-button-s mb-button-round reset-filters-button" (click)="resetFilters()">Reset</button>
    }
</div>
