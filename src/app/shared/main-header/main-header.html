<header [class.header-scrolled]="isScrolled">
    <img src="images/company-logo.png" alt="Company Logo" class="company-logo">

    <nav>
        <ul>
            <li class="header-list">
                <a href="#" class="header-link mb-link">Home</a>
            </li>

            <li class="header-list">
                <a href="#" class="header-link mb-link">About</a>
            </li>

            <li class="header-list">
                <a href="#" class="header-link mb-link">Services</a>
            </li>

            <li class="header-list">
                <a href="#" class="header-link mb-link">Blog</a>
            </li>

            <li class="header-list">
                <a href="#" class="header-link mb-link">Contact</a>
            </li>
        </ul>
    </nav>

    @if (isUserSignedIn()) {
        <a class="mb-button-naked user-profile-link">
            <fa-icon [icon]="faUser"></fa-icon>
        </a>
    } @else {
        <div class="header-button-links-wrapper">
            <a class="sign-in-link mb-link" href="#" (click)="openLoginModal()">Sign In</a>
            <a class="lets-talk-link mb-link" href="#" [effect]="'arrow'">Appointment</a>
        </div>
    }
</header>
